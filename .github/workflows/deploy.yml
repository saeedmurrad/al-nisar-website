name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily rebuild keeps the bundled YouTube feed snapshot (assets/videos.json) fresh.
    - cron: '30 2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Snapshot the latest YouTube uploads so the Videos page works without a CORS proxy
      - run: node scripts/fetch-videos-feed.mjs

      - run: npm run build

      # SPA fallback so deep links (e.g. /irshadat) work on GitHub Pages
      - run: cp dist/al-nisar-website/browser/index.csr.html dist/al-nisar-website/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/al-nisar-website/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
