<header
  class="sticky top-0 z-50 border-b border-emerald-900/30 bg-slate-950/70 backdrop-blur-md"
>
  <nav class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
    <a
      routerLink="/"
      class="group flex items-center gap-3"
      (click)="closeMenu()"
    >
      <img
        src="/assets/images/sufi_nisar.jpg"
        alt="AL-Nisar logo"
        class="h-10 w-10 rounded-full border border-amber-gold/40 object-cover"
      />
      <span class="flex flex-col leading-tight">
        <span class="text-lg font-bold tracking-wide text-text-primary transition group-hover:text-emerald-soft">
          AL-Nisar
        </span>
        <span class="font-urdu text-sm text-amber-gold/90">النثار</span>
      </span>
    </a>

    <!-- Desktop links -->
    <ul class="hidden items-center gap-1 md:flex">
      @for (link of links; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="text-emerald-soft border-emerald-primary/70"
            [routerLinkActiveOptions]="{ exact: link.exact }"
            class="rounded-lg border border-transparent px-3 py-2 text-sm font-medium text-text-muted
                   transition hover:text-emerald-soft"
          >
            <span [class.font-urdu]="i18n.isUrdu()">{{ i18n.t(link.key) }}</span>
          </a>
        </li>
      }
    </ul>

    <div class="hidden items-center gap-3 md:flex">
      <app-language-toggle />
      <a
        href="https://portal.al-nisar.com/"
        target="_blank"
        rel="noopener noreferrer"
        class="btn-outline !py-2 !text-xs"
      >
        <svg lucideLogIn [size]="14"></svg>
        <span [class.font-urdu]="i18n.isUrdu()">{{ i18n.t('nav.memberPortal') }}</span>
      </a>
    </div>

    <!-- Mobile menu button -->
    <button
      type="button"
      class="rounded-lg border border-emerald-900/40 p-2 text-text-muted transition hover:text-emerald-soft md:hidden"
      (click)="toggleMenu()"
      [attr.aria-label]="menuOpen() ? i18n.t('nav.close') : i18n.t('nav.menu')"
      [attr.aria-expanded]="menuOpen()"
    >
      @if (menuOpen()) {
        <svg lucideX [size]="22"></svg>
      } @else {
        <svg lucideMenu [size]="22"></svg>
      }
    </button>
  </nav>

  <!-- Mobile panel -->
  @if (menuOpen()) {
    <div
      class="border-t border-emerald-900/30 bg-spiritual-bg/95 px-4 py-4 backdrop-blur-md md:hidden"
    >
      <ul class="flex flex-col gap-1">
        @for (link of links; track link.path) {
          <li>
            <a
              [routerLink]="link.path"
              routerLinkActive="bg-emerald-deep/20 text-emerald-soft"
              [routerLinkActiveOptions]="{ exact: link.exact }"
              class="block rounded-xl px-4 py-3 text-sm font-medium text-text-muted transition hover:bg-spiritual-surface"
              (click)="closeMenu()"
            >
              <span [class.font-urdu]="i18n.isUrdu()">{{ i18n.t(link.key) }}</span>
            </a>
          </li>
        }
      </ul>
      <div class="mt-4 flex flex-col gap-3 border-t border-emerald-900/30 pt-4">
        <app-language-toggle />
        <a
          href="https://portal.al-nisar.com/"
          target="_blank"
          rel="noopener noreferrer"
          class="btn-outline w-full"
          (click)="closeMenu()"
        >
          <svg lucideLogIn [size]="14"></svg>
          <span [class.font-urdu]="i18n.isUrdu()">{{ i18n.t('nav.memberPortal') }}</span>
        </a>
      </div>
    </div>
  }
</header>
